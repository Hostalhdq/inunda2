<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ingreso colaboradores — Collao Alerta</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="brand"><span class="dot"></span>Collao Alerta</a>
    <div class="nav-links">
      <a href="index.html">← Volver al sitio</a>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="panel">
    <h2>Ingreso de colaboradores</h2>
    <p style="color:var(--text-dim); margin-top:-8px; margin-bottom:24px; font-size:.92rem;">
      Usa el usuario y contraseña que te entregó el administrador del proyecto.
    </p>

    <div class="error-box" id="login-error"></div>

    <form id="login-form">
      <div class="field">
        <label for="username">Usuario</label>
        <input type="text" id="username" autocomplete="username" placeholder="collao1" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-submit" style="width:100%; justify-content:center;">
        Ingresar
      </button>
    </form>
  </div>
</div>

<script src="assets/js/config.js"></script>
<script src="assets/js/auth.js"></script>
</body>
</html>
